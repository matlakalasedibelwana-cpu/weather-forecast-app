<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Weather Forecast App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="text"
            placeholder="Search a city or town"
            name="location"
            required
            id="search-input"
            class="search-input"
          />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <main>
        <section class="current-weather-section">
          <div class="current-forecast">
            <h1 id="city"></h1>
            <p class="current-details">
              <span id="time"></span><br />
              Humidity: <strong id="current-humidity">20%</strong><br />
              Wind: <strong id="current-windspeed">5.2km/h</strong>
            </p>
          </div>
          <div id="weather-icon"></div>
          <div class="current-temperature">
            <h2>
              <span
                class="current-temperature-value"
                id="current-temperature"
              ></span
              ><span class="current-temperature-unit">&deg;C</span>
            </h2>
            <p class="current-details">
              <span id="current-condition">Partly cloudy</span> <br />
              Feels like
              <strong><span id="feels-like-temperature">19</span>&deg;C</strong>
            </p>
          </div>
        </section>
      </main>

      <footer>
        This Project was coded by
        <a href="https://github.com/matlakalasedibelwana-cpu" target="_blank"
          >Matlakala Sedibelwana</a
        >, is open-sourced on
        <a
          href="https://github.com/matlakalasedibelwana-cpu/weather-forecast-app"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://global-weather-forecast-application.netlify.app/"
          target="_blank"
          >Netlify</a
        >.
      </footer>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
