<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Weather Forecast App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <form class="search-form">
          <input
            type="text"
            placeholder="Search a city or town"
            name="location"
            required
            class="search-input"
          />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <main>
        <section>
          <div class="current-forecast">
            <h1>Johannesburg</h1>
            <p>
              Monday 12:40 <br />
              Humidity: 20%<br />
              Wind: 5.2km/h
            </p>
          </div>
          <div class="current-weather-icon">🌤️</div>
          <div class="current-temperature">
            <h2>20&deg;C</h2>
            <p>
              Partly cloudy <br />
              Feels like 19&deg;C
            </p>
          </div>
        </section>
      </main>

      <footer>
        This Project was coded by
        <a href="https://github.com/matlakalasedibelwana-cpu" target="_blank"
          >Matlakala Sedibelwana</a
        >, is open-sourced on
        <a
          href="https://github.com/matlakalasedibelwana-cpu/weather-forecast-app"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://global-weather-forecast-application.netlify.app/"
          target="_blank"
          >Netlify</a
        >.
      </footer>
    </div>
  </body>
</html>
