<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Weather Forecast App</title>
  </head>
  <body>
    <header>
      <form>
        <input
          type="text"
          placeholder="Search a city or town"
          name="location"
          required
          id="location-input"
        />
        <input type="submit" value="Search" />
      </form>
    </header>
    <main>
      <dv class="current-forecast">
        <h1>Johannesburg</h1>
        <p>
          Moday 12:40 <br />
          Humidity: 20%<br />
          Wind: 5.2km/h
        </p>
      </dv>
      <div class="current-weather-icon">🌤️</div>
      <div class="current-temperature">
        20&deg;C <br />
        Partly cloudy <br />
        Feels like 19&deg;C
      </div>
    </main>

    <footer>
      This Project was coded by
      <a href="https://github.com/matlakalasedibelwana-cpu" target="_blank"
        >Matlakala Sedibelwana</a
      >, is open-sourced on
      <a
        href="https://github.com/matlakalasedibelwana-cpu/weather-forecast-app"
        target="_blank"
        >GitHub</a
      >
      and hosted on
      <a
        href="https://global-weather-forecast-application.netlify.app/"
        target="_blank"
        >Netlify</a
      >
    </footer>
  </body>
</html>
